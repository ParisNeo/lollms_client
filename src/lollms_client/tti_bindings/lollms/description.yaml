title: "LoLLMS TTI Server"
author: "ParisNeo"
version: 1.0.0
binding_name: "lollms"
description: |
  OpenAI-compatible Text-to-Image client that connects to a LoLLMS TTI Server or any OpenAI-compatible TTI API.

global_input_parameters:
  - name: "host_address"
    type: "str"
    description: "The base URL of the LoLLMS TTI Server or OpenAI-compatible TTI service (e.g. 'http://localhost:7860/v1')."
    mandatory: false
    default: "http://localhost:9642/v1"

  - name: "service_key"
    type: "str"
    description: "Bearer token used to authenticate requests to the server's endpoints. Leave empty if no authentication is required."
    mandatory: false
    is_secret: true
    default: ""

  - name: verify_ssl_certificate
    type: bool
    description: "Whether to verify the SSL certificate of the server. Defaults to true."
    mandatory: false
    default: true
    
  - name: certificate_file_path
    type: str
    description: "Path to a specific SSL certificate file (.pem, .crt) for verifying the server identity. Useful for self-signed certificates."
    mandatory: false
    default: ""

model_input_parameters:
  - name: "model_name"
    type: "str"
    description: "The name of the model to use from the remote service."
    mandatory: false
    default: ""
