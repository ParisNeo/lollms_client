binding_name: semantic_data_engineer
title: Semantic Data Engineer & Query Tool
author: ParisNeo & Lollms
version: 1.1.0
description: A complete suite of pre-compiled data engineering, filtering, schema querying, mathematical aggregation, plotting, and ontological ABox graph compilation macros. Requires zero code execution.
input_parameters:
  - name: file_name
    type: str
    description: Filename of the target CSV, Excel, or SQLite file.
    mandatory: true
  - name: table_name
    type: str
    description: Name of the sheet (Excel) or table (SQLite).
    mandatory: false
  - name: filter_column
    type: str
    description: Column name to apply filtering rules.
    mandatory: false
  - name: operator
    type: str
    description: Comparison operator for data slicing (==, !=, >, <, >=, <=, contains).
    mandatory: false
  - name: filter_value
    type: str
    description: Value to match against during filtering.
    mandatory: false
  - name: columns_to_keep
    type: list
    description: List of column names to slice and preserve.
    mandatory: false
  - name: limit
    type: int
    description: Max number of matching rows to return in the table preview.
    mandatory: false
  - name: save_as_new_artifact
    type: bool
    description: Save the filtered dataset slice as a new workspace file.
    mandatory: false
  - name: output_artifact_title
    type: str
    description: Title of the newly saved filtered file.
    mandatory: false
commands:
  - name: tool_get_table_schema
    title: Get Dataset Schema
    description: Inspects the file and returns columns, data types, row counts, and sample values.
  - name: tool_filter_and_slice_data
    title: Filter and Slice Data
    description: Slices, filters, and queries rows matching criteria without code execution, optionally saving output as a new artifact.
  - name: tool_get_unique_values
    title: Get Unique Column Values
    description: Lists unique category elements and frequency counts for a column.
  - name: tool_compute_column_aggregations
    title: Compute Column Aggregations
    description: Calculates mathematical aggregations (sum, mean, min, max, count), optionally grouping by another column.
  - name: tool_update_cell_value
    title: Update Cell Value
    description: Surgically updates a single cell value in a spreadsheet or database row without code execution.
  - name: tool_insert_new_row
    title: Insert New Row
    description: Inserts a new row/record into a spreadsheet or SQLite table.
  - name: tool_delete_rows_by_criteria
    title: Delete Rows by Criteria
    description: Deletes all rows matching a specific column value.
  - name: tool_query_database_sql
    title: Query Database (SQL)
    description: Executes standard SQL queries directly against SQLite database files or local CSV/Excel table models.
  - name: tool_generate_advanced_visualization
    title: Generate Advanced Visualization
    description: Generates advanced multi-series charts (multi-line, stacked bar, scatter, pie) in high-quality dark mode.
  - name: tool_update_cell_value
    title: Update Cell Value
    description: Surgically updates a single cell value in a spreadsheet or database row without code execution.
  - name: tool_insert_new_row
    title: Insert New Row
    description: Inserts a new row/record into a spreadsheet or SQLite table.
  - name: tool_delete_rows_by_criteria
    title: Delete Rows by Criteria
    description: Deletes all rows matching a specific column value.
  - name: tool_query_database_sql
    title: Query Database (SQL)
    description: Executes standard SQL queries directly against SQLite database files or local CSV/Excel table models.
  - name: tool_generate_advanced_visualization
    title: Generate Advanced Visualization
    description: Generates advanced multi-series charts (multi-line, stacked bar, scatter, pie) in high-quality dark mode.
  - name: tool_build_turtle_from_text
    title: Build Turtle (.ttl) Graph
    description: Converts plain text schemas, structured lists, or CSV rows into a valid Turtle (.ttl) graph file on disk and registers it.
  - name: tool_add_triples_to_graph
    title: Add Triples to Graph
    description: Surgically appends new semantic triples (Subject-Predicate-Object assertions) or namespace prefixes to an existing Turtle file.
  - name: tool_query_turtle_graph_sparql
    title: Query Turtle Graph (SPARQL)
    description: Executes a standard W3C SPARQL 1.1 query (SELECT, ASK, CONSTRUCT) against a local Turtle file.
  - name: tool_compute_statistics_and_plot
    title: Compute Stats and Plot
    description: Calculates column statistics and saves a corresponding PNG figure in the workspace.
  - name: tool_bootstrap_tbox_from_database
    title: Bootstrap TBox Ontology
    description: Automatically generates an ontological schema (TBox) matching the database's physical tables and columns.
  - name: tool_convert_to_abox
    title: Convert Relational rows to ABox Graph
    description: Translates physical database rows into semantic engram nodes (ABox) and links them to the long-term memory graph.
